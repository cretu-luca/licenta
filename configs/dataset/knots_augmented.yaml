defaults:
  - knots
  - _self_

loader:
  _target_: src.data.loader.KnotAugmentedDatasetLoader
  parameters:
    data_dir: ${paths.data_dir}
    data_name: knots_augmented_${task.name}
    csv_path: ${paths.data_dir}/knotinfo.csv
    target_column: ${task.col}
    label_shift: ${task.min_val}
    num_classes: ${task.num_classes}
    target_dtype: ${oc.select:task.target_dtype,long}
    limit: null
    strict: false
    force_reload: false
    pre_transform:
      _target_: src.transforms.graph2cell_face_lifting.Graph2CellFaceLifting
      complex_dim: 2
      signed: false
    n_diagrams: ${augmentation.n_diagrams}
    tries: ${augmentation.tries}
    method: ${augmentation.method}
    include_mirror: ${augmentation.include_mirror}
    aug_seed: ${augmentation.aug_seed}
